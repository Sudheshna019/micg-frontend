<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Captions | MICG ✦</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-base text-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar-custom">
        <a class="navbar-brand-custom" href="generate.html">MICG ✦</a>
        <div id="nav-auth-controls" class="d-none d-flex gap-3 align-items-center">
            <span id="nav-user-email" class="text-muted small d-none d-sm-block"></span>
            <a href="generate.html" class="btn-ghost text-decoration-none">Generator</a>
            <button class="btn-ghost" id="nav-logout-btn">Logout</button>
        </div>
    </nav>

    <main class="flex-grow-1 p-3 p-md-5">
        <div class="container" style="max-width: 900px;">
            <div class="mb-5 text-center">
                <h1 class="page-title h3 fw-bold mb-1">Your Collection 📚</h1>
                <p class="text-muted small">All your favorite AI-generated captions in one place.</p>
                <button id="refresh-btn" class="btn btn-sm btn-ghost mt-2">
                    <i class="bi bi-arrow-clockwise"></i> Refresh List
                </button>
            </div>

            <div id="loading-spinner" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="text-muted mt-2 small">Loading your saved captions...</p>
            </div>

            <div id="empty-message" class="d-none text-center py-5 glass-card">
                <i class="bi bi-folder2-open fs-1 text-muted opacity-25 mb-3"></i>
                <p class="text-muted">You haven't saved any captions yet.</p>
                <a href="generate.html" class="btn btn-sm btn-outline-primary mt-2">Go generate some!</a>
            </div>

            <div id="saved-captions-list" class="row g-4">
                <!-- Cards injected here -->
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
        <div id="toast-message" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="./js/header.js"></script>
    <script type="module" src="./js/saved.js"></script>
</body>

</html>
